  body {
    background-color: #08050f;
    color: #e2d8f0;

    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

    position: fixed;
    inset: 0;
    z-index: 0;

  }

  .bg-glow-tr {
    position: fixed;
    top: -150px; right: -100px;
    width: 650px; height: 550px;
    background: radial-gradient(ellipse at center, rgba(120,60,240,0.22) 0%, transparent 68%);
    z-index: 0;
    pointer-events: none;
  }
  .bg-glow-bl {
    position: fixed;
    bottom: -120px; left: -80px;
    width: 550px; height: 450px;
    background: radial-gradient(ellipse at center, rgba(90,30,200,0.14) 0%, transparent 68%);
    z-index: 0;
    pointer-events: none;
  }
  .bg-glow-center {
    position: fixed;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 300px;
    background: radial-gradient(ellipse at center, rgba(100,40,220,0.07) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 52px 24px 72px;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 60px; height: 60px;
    border: 1.5px solid rgba(160,100,255,0.45);
    border-radius: 16px;
    margin-bottom: 22px;
    background: rgba(120,60,240,0.1);
  }
  .logo-icon svg { width: 30px; height: 30px; }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #fff;
    text-transform: uppercase;
  }
  header p {
    margin-top: 10px;
    font-size: 13.5px;
    color: rgba(200,170,255,0.45);
    letter-spacing: 0.05em;
  }

  .divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, rgba(160,100,255,0.0), rgba(160,100,255,0.7), rgba(160,100,255,0.0));
    margin: 18px auto 0;
    border-radius: 2px;
  }

  .professor-block {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 22px;
    background: rgba(120,60,240,0.08);
    border: 1px solid rgba(160,100,255,0.18);
    border-radius: 10px;
    padding: 8px 16px 8px 12px;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .professor-block:hover {
    background: rgba(120,60,240,0.16);
    border-color: rgba(160,100,255,0.45);
  }
  .professor-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(200,170,255,0.35);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }
  .professor-name {
    font-size: 13px;
    color: rgba(220,200,255,0.75);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }
  .professor-gh {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    color: rgba(160,100,255,0.7);
    font-family: 'DM Sans', sans-serif;
    margin-top: 1px;
  }
  .professor-gh svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* ── Search ── */
  .search-wrap {
    max-width: 480px;
    margin: 0 auto 12px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(120,60,240,0.07);
    border: 1px solid rgba(160,100,255,0.2);
    border-radius: 10px;
    padding: 12px 16px 12px 44px;
    color: #e2d8f0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: rgba(200,170,255,0.3); }

    border-color: rgba(160,100,255,0.55);
    box-shadow: 0 0 0 3px rgba(120,60,240,0.12);
  }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    color: #c8a0ff;
  }
  .clear-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(200,170,255,0.4);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    display: none;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: rgba(200,170,255,0.9); }

  .search-hints {
    text-align: center;
    font-size: 12px;
    color: rgba(200,170,255,0.2);
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }

    display: inline-block;
    background: rgba(120,60,240,0.12);
    border: 1px solid rgba(160,100,255,0.15);
    border-radius: 5px;
    padding: 2px 7px;
    margin: 0 3px;

  .count {
    text-align: center;
    margin-bottom: 24px;
    font-size: 13px;
    color: rgba(200,170,255,0.3);
    letter-spacing: 0.05em;

  .grid {

    gap: 18px;

  /* ── Card ── */
  .card {
    background: rgba(18, 10, 32, 0.8);

    overflow: hidden;
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;

    display: flex;
    flex-direction: column;
    backdrop-filter: blur(10px);

    transform: translateY(-5px);

    box-shadow: 0 0 30px rgba(120,60,240,0.18), 0 0 0 1px rgba(160,100,255,0.12);

    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

    content: '';

    inset: 0;
    background-image:

      linear-gradient(90deg, rgba(160,100,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;

  .card-thumb-label {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 12px;
  }
  .card-num {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(120,60,240,0.2);
    border: 1px solid rgba(160,100,255,0.35);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(200,160,255,0.9);
    padding: 2px 8px;
    letter-spacing: 0.05em;
    z-index: 2;
    font-family: 'Syne', sans-serif;
  }

    padding: 14px 16px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;

    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #f0e8ff;

    overflow: hidden;

  .card-author {
    font-size: 12.5px;
    color: rgba(200,170,255,0.45);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }

    align-items: center;
    justify-content: center;

    font-size: 12px;
    font-weight: 500;

    color: #e8d8ff;
    border-radius: 3px;
    padding: 0 1px;
  }

    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 0;
    color: rgba(200,170,255,0.25);
    font-size: 14px;
  }
</style>
</head>

function thumbColors(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % 360;
  const purple = (h + 260) % 360;
  return { bg: `hsl(${purple},40%,10%)`, txt: `hsl(${purple},60%,62%)` };
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function highlight(str, q) {
  if (!q) return escapeHtml(str);
  const safe = escapeHtml(str);
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark>$1</mark>');
}

function buildCard(s, q = '') {
  const { bg, txt } = thumbColors(s.name);
  return `
    <div class="card" data-search="${s.name.toLowerCase()} ${s.game.toLowerCase()} ${s.num}">
      <div class="card-thumb" style="background:${bg}">
        <span class="card-num">${String(s.num).padStart(2,'0')}</span>
        <span class="card-thumb-label" style="color:${txt}">${escapeHtml(s.game)}</span>
      </div>
      <div class="card-body">
        <div class="card-game">${highlight(s.game, q)}</div>
        <div class="card-author">${highlight(s.name, q)}</div>
        <div class="card-actions">
          <a class="btn-icon" href="${s.github}" target="_blank" rel="noopener" title="GitHub">
            ${githubSVG} GitHub
          </a>
          <a class="btn-icon play" href="${s.vercel}" target="_blank" rel="noopener" title="Jogar">
            ${playSVG} Jogar
          </a>
        </div>
      </div>
    </div>`;
}

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function filterCards() {
  const raw = document.getElementById('search').value.trim();
  const q = normalize(raw);
  const clearBtn = document.getElementById('clear-btn');
  clearBtn.style.display = raw ? 'block' : 'none';

  // number search: #11 or just "11"
  const numMatch = q.match(/^#?(\d+)$/);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let vis = 0;

  students.forEach(s => {
    let match = false;
    if (!q) {
      match = true;
    } else if (numMatch) {
      match = s.num === parseInt(numMatch[1], 10);
    } else {
      match = normalize(s.name).includes(q) || normalize(s.game).includes(q);
    }
    if (match) {
      grid.insertAdjacentHTML('beforeend', buildCard(s, numMatch ? '' : raw));
      vis++;
    }
  });

  document.getElementById('count').textContent = vis === students.length
    ? `${students.length} jogos`
    : `${vis} de ${students.length} jogos`;

  if (vis === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Nenhum resultado encontrado.';
    grid.appendChild(empty);
  }
}

function clearSearch() {
  document.getElementById('search').value = '';
  filterCards();
  document.getElementById('search').focus();
}

function handleKey(e) {
  if (e.key === 'Escape') clearSearch();
}

// initial render
document.getElementById('grid').innerHTML = students.map(s => buildCard(s)).join('');
</script>
</body>
</html>
